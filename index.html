<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual Stack Security | 2023</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="hero">
        <div class="logo">Dual Stack Security</div>
        <p>2023 yildan beri raqamli xavfsizlik himoyasida</p>
    </header>

    <main class="container">
        
        <section class="section">
            <h2 class="section-title">Bizning Ilovalar (APK)</h2>
            <div id="apps-container" class="cards-grid">
                </div>
        </section>

        <section class="section">
            <h2 class="section-title">Bizning Saytlar</h2>
            <div id="sites-container" class="cards-grid">
                </div>
        </section>

        <section class="section support-section">
            <h2 class="section-title">Qo'llab-quvvatlash (Support)</h2>
            <p>Savollaringiz bo'lsa, bizga xabar yuboring. Sizning standart pochtangiz orqali xat tayyorlanadi.</p>
            
            <form id="support-form" class="support-form">
                <input type="text" id="user-name" placeholder="Ismingiz" required>
                <textarea id="user-message" rows="5" placeholder="Xabaringizni yozing..." required></textarea>
                <button type="submit" class="btn btn-primary">Pochta orqali yuborish</button>
            </form>
        </section>

    </main>

    <footer>
        <p>&copy; 2023 Dual Stack Security. Barcha huquqlar himoyalangan.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
